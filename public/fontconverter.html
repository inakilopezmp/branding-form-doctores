<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Conversor de fuentes para jsPDF</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.25rem; margin-bottom: 1rem; }
    label { display: block; margin-top: 0.75rem; font-weight: 500; }
    input[type="text"], select { width: 100%; padding: 0.5rem; margin-top: 0.25rem; }
    input[type="file"] { margin-top: 0.25rem; }
    button { margin-top: 1rem; padding: 0.5rem 1rem; cursor: pointer; background: #0f172a; color: #fff; border: none; border-radius: 6px; }
    button:hover { background: #1e293b; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    textarea { width: 100%; height: 200px; margin-top: 0.5rem; padding: 0.5rem; font-family: monospace; font-size: 12px; resize: vertical; }
    .hint { font-size: 0.875rem; color: #64748b; margin-top: 0.25rem; }
    a.download { display: inline-block; margin-top: 0.5rem; color: #2563eb; }
  </style>
</head>
<body>
  <h1>Conversor de fuentes para jsPDF</h1>
  <p class="hint">Sube un archivo .ttf para generar el código que registra la fuente en jsPDF. Si RawGit no funciona, usa esta herramienta local.</p>

  <label for="fontFile">Archivo de fuente (.ttf)</label>
  <input type="file" id="fontFile" accept=".ttf,font/ttf" />

  <label for="fontName">Nombre de la fuente (ej: Montserrat)</label>
  <input type="text" id="fontName" value="Montserrat" placeholder="Montserrat" />

  <label for="fontStyle">Estilo</label>
  <select id="fontStyle">
    <option value="normal">normal</option>
    <option value="bold">bold</option>
    <option value="italic">italic</option>
    <option value="bolditalic">bolditalic</option>
  </select>

  <button type="button" id="btnCreate" disabled>Generar código</button>

  <label for="output">Código generado (para usar con addFileToVFS / addFont)</label>
  <textarea id="output" readonly placeholder="Sube un .ttf y pulsa Generar código."></textarea>
  <a href="#" class="download" id="linkDownload" style="display:none">Descargar .js</a>

  <script>
    const fontFile = document.getElementById('fontFile');
    const fontName = document.getElementById('fontName');
    const fontStyle = document.getElementById('fontStyle');
    const btnCreate = document.getElementById('btnCreate');
    const output = document.getElementById('output');
    const linkDownload = document.getElementById('linkDownload');

    fontFile.addEventListener('change', function () {
      const file = this.files[0];
      if (file) {
        const base = file.name.replace(/\.ttf$/i, '');
        if (!fontName.value) fontName.value = base;
        btnCreate.disabled = false;
      } else {
        btnCreate.disabled = true;
      }
    });

    function arrayBufferToBase64(buffer) {
      const bytes = new Uint8Array(buffer);
      let binary = '';
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      return btoa(binary);
    }

    btnCreate.addEventListener('click', function () {
      const file = fontFile.files[0];
      if (!file) { output.value = 'Elige un archivo .ttf'; return; }
      const name = fontName.value.trim() || 'CustomFont';
      const style = fontStyle.value;
      const fileName = name + '-' + style + '.ttf';

      const reader = new FileReader();
      reader.onload = function (e) {
        const base64 = arrayBufferToBase64(e.target.result);
        const js = "// Pegar en tu proyecto o cargar antes de usar doc.setFont('" + name + "', '" + style + "')\n" +
          "const fontBase64 = '" + base64 + "';\n" +
          "doc.addFileToVFS('" + fileName + "', fontBase64);\n" +
          "doc.addFont('" + fileName + "', '" + name + "', '" + style + "');\n";
        output.value = js;
        linkDownload.style.display = 'inline-block';
        linkDownload.download = name + '-' + style + '.js';
        linkDownload.href = 'data:application/javascript;charset=utf-8,' + encodeURIComponent(js);
      };
      reader.readAsArrayBuffer(file);
    });
  </script>
</body>
</html>
